name: Docker Build & Publish

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 1.0.0)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skygenesisenterprise/aether-bank
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE_NAME: skygenesisenterprise/aether-bank

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      package_version: ${{ steps.version.outputs.package_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            CLEAN_VERSION="${INPUT_VERSION#v}"
            VERSION="v${CLEAN_VERSION}"
            PACKAGE_VERSION="${CLEAN_VERSION}"
          else
            TAG="${{ github.ref_name }}"
            CLEAN_VERSION="${TAG#v}"
            VERSION="v${CLEAN_VERSION}"
            PACKAGE_VERSION="${CLEAN_VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"
          echo "Package version: $PACKAGE_VERSION"

      - name: Verify Dockerfile.cloud exists
        run: |
          if [ -f "Dockerfile.cloud" ]; then
            echo "✅ Dockerfile.cloud found"
          else
            echo "❌ Dockerfile.cloud not found"
            find . -name "Dockerfile*" -type f
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract Docker metadata for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=auto

      - name: Extract Docker metadata for Docker Hub
        id: meta-dockerhub
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=auto

      - name: Build and push Docker image to GHCR
        id: build-ghcr
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.cloud
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push Docker image to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.cloud
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Sign Docker image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta-ghcr.outputs.tags }}
          DIGEST: ${{ steps.build-ghcr.outputs.digest }}
        run: |
          echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Update docker-compose.cloud.yml image tag
        run: |
          sed -i 's|image: aetherbank:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}|' docker-compose.cloud.yml

      - name: Upload docker-compose.cloud.yml
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: docker-compose-cloud
          path: docker-compose.cloud.yml
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download docker-compose
        uses: actions/download-artifact@v8
        with:
          name: docker-compose-cloud
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Aether Bank v${{ needs.build.outputs.package_version }}
          body: |
            ## Aether Bank v${{ needs.build.outputs.package_version }}

            🐳 **Docker Images**:
            - **GitHub Container Registry**: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}`
            - **Docker Hub**: `${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ needs.build.outputs.version }}`

            ### 🚀 Quick Start

            ```bash
            # Pull from GHCR
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}
            docker run -p 3000:3000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}

            # Or use docker-compose
            wget https://raw.githubusercontent.com/skygenesisenterprise/aether-bank/${{ github.ref_name }}/docker-compose.cloud.yml
            docker-compose -f docker-compose.cloud.yml up -d
            ```

            ### 📋 Components

            - **Next.js Frontend**: Port 3000 (public)
            - **Go API Server**: Port 8080 (internal)
            - **Embedded PostgreSQL**: Port 5432 (internal)

            ### 🔧 Environment Variables

            Required:
            - `DB_PASSWORD`: PostgreSQL password
            - `JWT_SECRET`: JWT signing secret

            Optional:
            - `CORS_ALLOWED_ORIGINS`: CORS origins (default: bank.skygenesisenterprise.com)

            ---

            📦 **Made with ❤️ by [Sky Genesis Enterprise](https://skygenesisenterprise.com)**
          draft: false
          prerelease: false
